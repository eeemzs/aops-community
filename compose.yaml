name: aops-community

services:
  postgres:
    image: ghcr.io/eeemzs/aops-community-base-postgres:17-bookworm@sha256:5530681ea5d3e2ed4ce396f9b5cb443efbac6baf2a8a19c0c0635e40ae7eadce
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AOPS_POSTGRES_DB:-aops}
      POSTGRES_USER: ${AOPS_POSTGRES_USER:-aops}
      POSTGRES_PASSWORD: ${AOPS_POSTGRES_PASSWORD:?set AOPS_POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - aops-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${AOPS_POSTGRES_PORT:-5432}:5432"

volumes:
  aops-postgres-data:
    name: ${AOPS_POSTGRES_VOLUME_NAME:-aops-community-postgres-data}
