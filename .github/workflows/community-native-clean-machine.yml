name: Community native clean-machine candidate verification

on:
  workflow_dispatch:
    inputs:
      candidate_sha:
        description: Exact 40-character commit on public main to verify
        required: true
        type: string
      confirm:
        description: Type verify- followed by the exact candidate SHA
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: community-native-clean-machine-${{ inputs.candidate_sha }}
  cancel-in-progress: false

jobs:
  candidate-contract:
    name: Exact public main candidate
    runs-on: ubuntu-24.04
    steps:
      - name: Clone public main without credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: eeemzs/aops-community
          ref: main
          fetch-depth: 0
          fetch-tags: false
          persist-credentials: false

      - name: Validate the immutable candidate input
        shell: bash
        env:
          CANDIDATE_SHA: ${{ inputs.candidate_sha }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          [[ "$CANDIDATE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CONFIRM" == "verify-${CANDIDATE_SHA}" ]]
          [[ "$(git rev-parse "${CANDIDATE_SHA}^{commit}")" == "$CANDIDATE_SHA" ]]
          git merge-base --is-ancestor "$CANDIDATE_SHA" HEAD

  native-source-lifecycle:
    name: Docker-free native N1 (${{ matrix.runner }})
    needs: candidate-contract
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - windows-2025
          - macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Clone the exact public candidate without credentials
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: eeemzs/aops-community
          ref: ${{ inputs.candidate_sha }}
          fetch-depth: 1
          fetch-tags: false
          persist-credentials: false

      - name: Pin Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: Preserve the bundled release CLI contract on Windows
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          .\aops.ps1 server --help

      - name: Preserve the bundled release CLI contract on Unix
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          ./aops server --help

      - name: Pin pnpm 11
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.9.0
          run_install: false

      - name: Install a clean PostgreSQL 17 service without Docker
        id: postgres
        uses: ikalnytskyi/action-setup-postgres@c4dda34aae1c821e3a771b68b73b13af3198a7ee # v8
        with:
          username: aops_clean
          password: ${{ format('AopsN1_{0}_{1}', github.run_id, github.run_attempt) }}
          database: aops_clean
          port: '55432'
          postgres-version: '17'
          ssl: false

      - name: Install and build the source-local CLI
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm --filter @aops/aops-cli... run build

      - name: Prove native setup, health, restart, logs and stop
        shell: bash
        env:
          AOPS_CLEAN_MACHINE_POSTGRES_URL: ${{ steps.postgres.outputs.connection-uri }}
        run: |
          set -euo pipefail
          pnpm exec node scripts/community-export/community-native-clean-machine.mjs --json
