name: Publish AOPS Community CLI to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, without the v prefix."
        required: true
        type: string
      confirm:
        description: "Enter publish-v<version>."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish-aopslab-aops-cli
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'eeemzs/aops-community' && github.ref == 'refs/heads/main'
    environment: npm-production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Set up Node.js and npm
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org/

      - name: Download the CLI archive from the GitHub Release
        id: release_asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -euo pipefail
          test "$CONFIRM" = "publish-v$VERSION"

          asset="aopslab-aops-cli-$VERSION.tgz"
          destination="$RUNNER_TEMP/aops-cli-release"
          mkdir -p "$destination"
          gh release download "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset" \
            --dir "$destination"

          test -s "$destination/$asset"
          echo "tgz=$destination/$asset" >> "$GITHUB_OUTPUT"

      - name: Publish the exact release archive
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$NODE_AUTH_TOKEN"
          npm publish "${{ steps.release_asset.outputs.tgz }}" --access public

      - name: Verify the published package
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          published="$(npm view "@aopslab/aops-cli@$VERSION" version)"
          test "$published" = "$VERSION"
          npm view "@aopslab/aops-cli@$VERSION" name version dist-tags.latest --json
