name: Community PR verification

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: community-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, typecheck, and migration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
    steps:
      - name: Check out the reviewed head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify patch hygiene
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git diff --check "$BASE_SHA...$HEAD_SHA" -- . ':(exclude)release/THIRD_PARTY_NOTICES'

          if git diff --name-only "$BASE_SHA...$HEAD_SHA" | grep -q '^release/'; then
            release_checkout="$RUNNER_TEMP/aops-community-release-head"
            git worktree add --detach "$release_checkout" "$HEAD_SHA"
            node "$release_checkout/scripts/community-export/community-release-packaging.mjs" verify-commit \
              --checkout-root "$release_checkout" \
              --json
          fi

      - name: Verify committed source checksums
        shell: bash
        run: sha256sum --check --quiet SHA256SUMS

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.9.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22.18.0"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build and typecheck the distribution
        run: pnpm verify

      - name: Run strict migration unit tests
        run: pnpm --filter @aops/pg-bootstrap test:unit
